<head>
<meta charset="utf-8">

<title>Plan4Better · GOAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#283648;overflow:hidden;}
  #stage{position:fixed;inset:0;overflow:hidden;background:#283648;
    background-image:repeating-linear-gradient(0deg,transparent 0 27px,rgba(255,255,255,0.035) 27px 28px),repeating-linear-gradient(90deg,transparent 0 27px,rgba(255,255,255,0.035) 27px 28px);
    font-family:'Roboto',system-ui,sans-serif;}
  #glow{position:absolute;left:50%;top:42%;width:1100px;height:1100px;margin-left:-550px;margin-top:-550px;border-radius:50%;
    background:radial-gradient(circle, rgba(43,180,129,0.30), transparent 60%);filter:blur(6px);pointer-events:none;}
  #rings{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .ring{position:absolute;left:50%;top:50%;border-radius:50%;border:1.5px solid #2BB481;}
  #lockup{position:absolute;top:30px;left:36px;display:flex;align-items:center;gap:12px;opacity:0.92;z-index:3;}
  #lockup img{display:block;width:auto;}
  #lockup .sep{width:1px;height:15px;background:rgba(255,255,255,0.2);}
  #center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 6vw;z-index:2;}
  #sentence{max-width:min(880px,86vw);text-align:center;font-family:'Inter Tight',system-ui,sans-serif;font-weight:600;
    font-size:clamp(30px,4.8vw,58px);line-height:1.14;letter-spacing:-0.02em;color:#fff;text-wrap:balance;will-change:transform,opacity;}
  #sentence.resolve{font-weight:700;font-size:clamp(40px,6.2vw,78px);}
  #sentence .hl{position:relative;color:#2BB481;white-space:nowrap;display:inline-block;}
  #sentence .hl .ul{position:absolute;left:0;right:0;bottom:-0.07em;height:0.08em;background:#2BB481;border-radius:4px;transform:scaleX(0);transform-origin:left center;opacity:0.9;}
  #cue{position:absolute;left:50%;bottom:38px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;z-index:3;}
  #cueText{font-size:clamp(13px,1.4vw,15.5px);font-weight:500;letter-spacing:0.02em;color:#AAB3C0;white-space:nowrap;}
  #cueRing{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;}
</style>
</head>

    <div id="cueText">Scrollen, um die Dashboards zu entdecken</div>
    <div id="cueRing"><div id="cueArrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="#2BB481" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
  </div>
</div>
<script>
(function(){
var GREEN='#2BB481';
var TOTAL=16, SCENE=4;
var BEATS=[
 {parts:[{t:'Wie entscheidet eine Stadt, wo die nächste '},{t:'Bushaltestelle',hl:1},{t:' entsteht?'}]},
 {parts:[{t:'Wie weit läuft dein Kind bis zur nächsten '},{t:'Schule',hl:1},{t:'?'}]},
 {parts:[{t:'Erreichst du Arzt, Markt und Park in '},{t:'15 Minuten',hl:1},{t:' — zu Fuß?'}]},
 {parts:[{t:'Erreichbarkeit, '},{t:'sichtbar',hl:1},{t:' gemacht.'}],resolve:1}
];
function eoc(t){t-=1;return t*t*t+1;}
function eic(t){return t*t*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var sentEl=document.getElementById('sentence');
var glow=document.getElementById('glow');
var cueArrow=document.getElementById('cueArrow');
var cueText=document.getElementById('cueText');
var ringsWrap=document.getElementById('rings');
var rings=[];
for(var i=0;i<4;i++){var d=document.createElement('div');d.className='ring';ringsWrap.appendChild(d);rings.push(d);}
var curIdx=-1, ulEl=null;
function buildBeat(i){var b=BEATS[i];var html='';b.parts.forEach(function(p){if(p.hl){html+='<span class="hl">'+esc(p.t)+'<i class="ul"></i></span>';}else{html+='<span>'+esc(p.t)+'</span>';}});sentEl.innerHTML=html;sentEl.className=b.resolve?'resolve':'';ulEl=sentEl.querySelector('.ul');}
var start=null;
function frame(ts){if(start==null)start=ts;var t=((ts-start)/1000)%TOTAL;
 var idx=Math.min(BEATS.length-1,Math.floor(t/SCENE));
 if(idx!==curIdx){curIdx=idx;buildBeat(idx);}
 var lt=t-idx*SCENE, inD=0.7, outD=0.55, hold=SCENE-inD-outD;
 var op=1, ty=0;
 if(lt<inD){var e=eoc(clamp(lt/inD,0,1));op=e;ty=(1-e)*22;}
 else if(lt>inD+hold){var e2=eic(clamp((lt-inD-hold)/outD,0,1));op=1-e2;ty=-e2*14;}
 var u=eoc(clamp((lt-(inD+0.12))/0.65,0,1));
 sentEl.style.opacity=op;sentEl.style.transform='translateY('+ty+'px)';
 if(ulEl)ulEl.style.transform='scaleX('+u+')';
 var P=6.5,maxR=560;
 for(var k=0;k<4;k++){var pr=(((t+(k*P)/4)%P)/P);var r=pr*maxR;var ro=rings[k];ro.style.width=(r*2)+'px';ro.style.height=(r*2)+'px';ro.style.marginLeft=(-r)+'px';ro.style.marginTop=(-r)+'px';ro.style.opacity=((1-pr)*0.18*eoc(clamp(pr*4,0,1)));}
 var gx=Math.sin(t*0.35)*120, gy=Math.cos(t*0.27)*90;
 glow.style.transform='translate('+gx+'px,'+gy+'px)';
 var bob=Math.abs(Math.sin((t*Math.PI)/0.95))*7;
 var pulse=0.75+0.25*(0.5+0.5*Math.sin((t*Math.PI)/1.4));
 cueArrow.style.transform='translateY('+bob+'px)';
 cueText.style.opacity=pulse;
 requestAnimationFrame(frame);}
requestAnimationFrame(frame);
document.getElementById('cue').addEventListener('click',function(){
 try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'goat-scroll'},'*');}catch(e){}
 try{if(window.parent===window)window.scrollTo({top:window.innerHeight,behavior:'smooth'});}catch(e){}
});
})();
</script>
